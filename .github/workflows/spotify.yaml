name: Update Spotify Top Artists

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0' # weekly Sunday UTC

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch Spotify data
        env:
          CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
        run: |
          ACCESS_TOKEN=$(curl -s -X POST https://accounts.spotify.com/api/token \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d grant_type=refresh_token \
            -d refresh_token=$REFRESH_TOKEN \
            -u "$CLIENT_ID:$CLIENT_SECRET" | jq -r .access_token)

          curl -s "https://api.spotify.com/v1/me/top/artists?limit=10&time_range=medium_term" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            > top-artists.json
      
      - name: Move data to temp
        run: |
          mkdir -p /tmp/data
          mv top-artists.json /tmp/top-artists.json

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit
        run: |
          git checkout --orphan spotify-data
          git rm -rf .
          mkdir data
          mv /tmp/top-artists.json data/
          git add data
          git commit -m "Update Spotify data" || echo "No changes to commit"
          git push --force origin spotify-data
